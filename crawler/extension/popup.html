<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boss直聘职位采集器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>🎯 Boss职位采集器</h1>
    <div class="status" id="statusText">准备就绪</div>
  </div>

  <div class="content">
    <!-- 状态概览 -->
    <div class="section">
      <div class="section-title">运行状态</div>
      <div class="info-row">
        <span class="info-label">采集状态</span>
        <span class="info-value" id="crawlStatus">待命</span>
      </div>
      <div class="info-row">
        <span class="info-label">今日采集</span>
        <span class="info-value" id="todayCount">0 条</span>
      </div>
      <div class="info-row">
        <span class="info-label">Cookie状态</span>
        <span class="info-value success" id="cookieStatus">有效</span>
      </div>
      <div class="info-row">
        <span class="info-label">飞书连接</span>
        <span class="info-value" id="feishuStatus">未配置</span>
      </div>
    </div>

    <!-- 快捷操作 -->
    <div class="section">
      <div class="section-title">快捷操作</div>
      <button class="btn btn-primary" id="btn-open-dashboard">📊 打开工作台</button>
      <button class="btn btn-primary" id="startBtn">🚀 立即采集</button>
      <button class="btn btn-secondary" id="configBtn">⚙️ 配置设置</button>
      <button class="btn btn-secondary" id="cookieBtn">🍪 刷新Cookie</button>
      
      <div class="progress" id="progressSection">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">采集中...</div>
      </div>
      
      <div class="message" id="messageBox"></div>
    </div>

    <!-- 功能开关 -->
    <div class="section">
      <div class="section-title">功能开关</div>
      <div class="config-item">
        <span>自动定时采集</span>
        <div class="toggle is-active" id="autoToggle"></div>
      </div>
      <div class="config-item">
        <span>AI简历匹配</span>
        <div class="toggle" id="aiToggle"></div>
      </div>
      <div class="config-item">
        <span>推送飞书通知</span>
        <div class="toggle" id="pushToggle"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    Cookie有效期: 7-30天 | 采集间隔: 5-8秒
  </div>

  <script src="popup.js"></script>
</body>
</html>
